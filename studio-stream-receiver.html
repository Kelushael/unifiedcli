<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⬡ DANAE STUDIO // Stream Receiver</title>
<style>
:root {--pink:#ff6eb4;--yellow:#ffe94d;--blue:#7dd8f8;--lime:#aaff00;--black:#080808;--bg:#0d0d0d;--bg2:#111;--bg3:#181818;--dim:#252525;--dim2:#333;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--lime);font-family:'Courier New',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#topbar{background:var(--black);border-bottom:1px solid var(--dim);padding:0 14px;height:36px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.t-title{color:var(--pink);font-size:10px;letter-spacing:5px;text-transform:uppercase;}
.pills{display:flex;gap:5px;}
.pill{font-size:8px;letter-spacing:2px;padding:2px 7px;border-radius:10px;border:1px solid;text-transform:uppercase;}
.p-stream{color:var(--yellow);border-color:var(--yellow);animation:pulse 0.8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#main{flex:1;display:flex;overflow:hidden;}
#left{width:280px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--dim);background:var(--bg2);overflow:hidden;}
.sect-hd{font-size:8px;letter-spacing:3px;color:#444;padding:5px 10px;text-transform:uppercase;background:var(--black);border-bottom:1px solid var(--dim);}
.status{padding:8px 10px;font-size:9px;display:flex;align-items:center;gap:5px;}
.dot{width:6px;height:6px;border-radius:50%;background:#f44;}
.dot.live{background:var(--yellow);animation:pulse 0.8s infinite;}
#info{padding:8px 10px;font-size:8px;color:#555;border-bottom:1px solid var(--dim);}
#controls{padding:10px;display:flex;flex-direction:column;gap:8px;border-bottom:1px solid var(--dim);}
.btn{background:transparent;border:1px solid var(--dim2);color:#666;font-size:8px;padding:4px 8px;cursor:pointer;text-transform:uppercase;transition:.15s;border-radius:2px;}
.btn:hover{border-color:var(--lime);color:var(--lime);}
.btn.primary{border-color:var(--lime);color:var(--lime);}
.btn.primary:hover{background:var(--lime);color:var(--black);}
#code-panel{flex:1;overflow-y:auto;padding:8px;font-size:8px;line-height:1.5;color:#666;font-weight:300;}
#code-panel::-webkit-scrollbar{width:2px;}
#code-panel::-webkit-scrollbar-thumb{background:var(--dim2);}
#preview{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--dim);}
#preview-bar{background:var(--black);border-bottom:1px solid var(--dim);padding:0 10px;height:28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#preview-bar span{font-size:8px;letter-spacing:2px;color:#444;text-transform:uppercase;}
#preview-frame{flex:1;border:none;background:white;}
#placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:var(--bg);}
.ph-icon{font-size:32px;color:var(--dim2);}
.ph-text{font-size:10px;letter-spacing:2px;color:#2a2a2a;}
#sbar{background:var(--black);border-top:1px solid var(--dim);padding:2px 14px;display:flex;justify-content:space-between;font-size:8px;letter-spacing:2px;color:#2a2a2a;flex-shrink:0;}
</style>
</head>
<body>
<div id="topbar">
  <div class="t-title">⬡ DANAE STUDIO // Stream</div>
  <div class="pills">
    <span class="pill p-stream">STREAMING</span>
  </div>
</div>

<div id="main">
<div id="left">
  <div class="sect-hd">// Streaming</div>
  <div class="status">
    <span class="dot live"></span>
    <span id="stream-status">Waiting...</span>
  </div>
  <div id="info">
    <div>Chunks: <strong id="chunk-count">0</strong></div>
    <div>Size: <strong id="size-display">0 B</strong></div>
  </div>

  <div class="sect-hd">// Actions</div>
  <div id="controls">
    <button class="btn primary" id="copy-btn">COPY</button>
    <button class="btn" id="download-btn">DOWNLOAD</button>
  </div>

  <div class="sect-hd">// Code</div>
  <div id="code-panel"></div>
</div>

<div id="preview">
  <div id="preview-bar">
    <span>// LIVE PREVIEW</span>
  </div>
  <div id="placeholder">
    <div class="ph-icon">⬡</div>
    <div class="ph-text">Streaming...</div>
  </div>
  <iframe id="preview-frame" style="display:none;"></iframe>
</div>
</div>

<div id="sbar">
  <span>Real-time HTML streaming from DANAE chat</span>
  <span id="updates">Ready</span>
</div>

<script>
(function(){"use strict";

const codePanel=document.getElementById('code-panel');
const previewFrame=document.getElementById('preview-frame');
const placeholder=document.getElementById('placeholder');
const streamStatus=document.getElementById('stream-status');
const chunkCount=document.getElementById('chunk-count');
const sizeDisplay=document.getElementById('size-display');
const updates=document.getElementById('updates');
const copyBtn=document.getElementById('copy-btn');
const downloadBtn=document.getElementById('download-btn');

let currentHTML='';
let chunks=0;

function formatSize(bytes){return (bytes/1024).toFixed(1)+'KB';}

window.addEventListener('message',(e)=>{
  if(e.origin!==window.location.origin)return;
  const data=e.data;

  if(data.type==='danae:stream'){
    chunks++;
    chunkCount.textContent=chunks;
    
    currentHTML=data.chunk||'';
    sizeDisplay.textContent=formatSize(currentHTML.length);

    // Display code in real-time
    codePanel.textContent=currentHTML;
    codePanel.scrollTop=codePanel.scrollHeight;

    // Update preview if complete HTML
    if(currentHTML.startsWith('<')){
      previewFrame.srcdoc=currentHTML;
      previewFrame.style.display='block';
      placeholder.style.display='none';
    }

    if(data.complete){
      streamStatus.textContent='Complete';
      updates.textContent='✓ Received '+chunks+' chunks';
    }else{
      streamStatus.textContent='Streaming...';
      updates.textContent='Chunk '+chunks+'...';
    }
  }
});

copyBtn.addEventListener('click',()=>{
  if(currentHTML){
    navigator.clipboard.writeText(currentHTML).then(()=>{
      copyBtn.textContent='✓ COPIED';
      setTimeout(()=>{copyBtn.textContent='COPY';},2000);
    });
  }
});

downloadBtn.addEventListener('click',()=>{
  if(!currentHTML)return;
  const a=document.createElement('a');
  a.href='data:text/html;charset=utf-8,'+encodeURIComponent(currentHTML);
  a.download='danae-stream-'+Date.now()+'.html';
  a.click();
  downloadBtn.textContent='✓ DOWNLOADED';
  setTimeout(()=>{downloadBtn.textContent='DOWNLOAD';},2000);
});

window.parent.postMessage({type:'danae:ready'},'*');
console.log('✓ Studio stream receiver ready');
})();
</script>
</body>
</html>
