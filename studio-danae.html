<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⬡ DANAE STUDIO // Artifact Builder</title>
<style>
:root {--pink:#ff6eb4;--yellow:#ffe94d;--blue:#7dd8f8;--lime:#aaff00;--black:#080808;--bg:#0d0d0d;--bg2:#111;--bg3:#181818;--dim:#252525;--dim2:#333;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--lime);font-family:'Courier New',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#topbar{background:var(--black);border-bottom:1px solid var(--dim);padding:0 14px;height:36px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.t-title{color:var(--pink);font-size:10px;letter-spacing:5px;text-transform:uppercase;}
.pills{display:flex;gap:5px;}
.pill{font-size:8px;letter-spacing:2px;padding:2px 7px;border-radius:10px;border:1px solid;text-transform:uppercase;}
.p-ai{color:var(--lime);border-color:var(--lime);}
.p-live{color:var(--pink);border-color:var(--pink);animation:pulse 2s infinite;}
.p-loop{color:var(--yellow);border-color:var(--yellow);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#studio{flex:1;display:flex;overflow:hidden;}
#left{width:300px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--dim);background:var(--bg2);overflow:hidden;}
.sect{border-bottom:1px solid var(--dim);flex-shrink:0;}
.sect-hd{font-size:8px;letter-spacing:3px;color:#444;padding:5px 10px;text-transform:uppercase;background:var(--black);}
.status-line{display:flex;align-items:center;gap:5px;padding:7px 10px;font-size:9px;}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--lime);}
#api-status{font-size:8px;color:#555;padding:7px 10px;}
#tool-rack{display:flex;flex-wrap:wrap;gap:4px;padding:7px 10px;}
.chip{font-size:8px;letter-spacing:1px;padding:2px 7px;border:1px solid var(--dim2);color:#555;cursor:pointer;text-transform:uppercase;transition:.15s;border-radius:2px;}
.chip.on{border-color:var(--lime);color:var(--lime);background:rgba(170,255,0,.07);}
#prompt-box{flex:1;background:var(--bg3);border:1px solid var(--dim);color:var(--blue);font-family:'Courier New',monospace;font-size:11px;padding:6px;resize:none;outline:none;line-height:1.6;}
#prompt-box:focus{border-color:var(--blue);}
#build-btn{width:100%;background:transparent;border:1px solid var(--lime);color:var(--lime);font-family:'Courier New',monospace;font-size:11px;padding:8px;cursor:pointer;letter-spacing:3px;text-transform:uppercase;transition:.15s;flex-shrink:0;}
#build-btn:hover:not(:disabled){background:var(--lime);color:var(--black);}
#build-btn:disabled{opacity:.25;cursor:default;}
#center{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--dim);}
#prev-bar{background:var(--black);border-bottom:1px solid var(--dim);padding:0 10px;height:30px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#prev-bar span{font-size:8px;letter-spacing:3px;color:#444;text-transform:uppercase;}
.pbtns{display:flex;gap:6px;}
.pbtn{font-size:8px;padding:2px 7px;border:1px solid var(--dim2);color:#555;background:transparent;cursor:pointer;text-transform:uppercase;transition:.15s;}
.pbtn:hover{border-color:var(--pink);color:var(--pink);}
#prev-ph{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.ph-big{font-size:28px;color:var(--dim2);}
.ph-msg{font-size:10px;letter-spacing:3px;color:#2a2a2a;}
#prev-frame{flex:1;border:none;display:none;background:white;}
#right{width:260px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg2);}
#code-out{flex:1;overflow-y:auto;padding:8px;font-size:9px;line-height:1.6;color:#444;white-space:pre-wrap;word-break:break-word;}
#code-out.live{color:#3a3;}
#code-out::-webkit-scrollbar{width:2px;}
#code-out::-webkit-scrollbar-thumb{background:var(--dim2);}
#log{height:130px;flex-shrink:0;border-top:1px solid var(--dim);overflow-y:auto;padding:6px 8px;font-size:8px;line-height:1.7;}
#log::-webkit-scrollbar{width:2px;}
.ll{display:flex;gap:5px;}
.lt{color:#2a2a2a;}.lai{color:var(--lime);}.lerr{color:#f44;}.lok{color:var(--yellow);}.ltool{color:var(--pink);}
#sbar{background:var(--black);border-top:1px solid var(--dim);padding:2px 14px;display:flex;justify-content:space-between;font-size:8px;letter-spacing:2px;color:#2a2a2a;flex-shrink:0;}
</style>
</head>
<body>
<div id="topbar">
  <div class="t-title">⬡ DANAE STUDIO // Artifact Builder</div>
  <div class="pills">
    <span class="pill p-ai">qwen:7b ✓</span>
    <span class="pill p-live">LIVE</span>
    <span class="pill p-loop">LOOP</span>
  </div>
</div>
<div id="studio">
<div id="left">
  <div class="sect">
    <div class="sect-hd">// DANAE Connection</div>
    <div class="status-line">
      <span class="status-dot" id="status-dot"></span>
      <span id="api-status">Detecting endpoint...</span>
    </div>
  </div>
  <div class="sect">
    <div class="sect-hd">// Active Tools</div>
    <div id="tool-rack"></div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;padding:6px 10px;gap:6px;min-height:0;">
    <label style="font-size:8px;color:var(--blue);letter-spacing:2px;">// Describe Artifact</label>
    <textarea id="prompt-box" placeholder="e.g. a dashboard showing Salesforce metrics..."></textarea>
    <button id="build-btn">⬡ BUILD with DANAE</button>
  </div>
</div>
<div id="center">
  <div id="prev-bar">
    <span>// LIVE PREVIEW</span>
    <div class="pbtns">
      <button class="pbtn" id="copy-btn">COPY</button>
      <button class="pbtn" id="dl-btn">DOWNLOAD</button>
    </div>
  </div>
  <div id="prev-ph">
    <div class="ph-big">⬡</div>
    <div class="ph-msg">describe · generate · preview</div>
  </div>
  <iframe id="prev-frame" sandbox="allow-scripts allow-same-origin"></iframe>
</div>
<div id="right">
  <div class="sect-hd">// Generated Code</div>
  <div id="code-out">// waiting...</div>
  <div id="log"></div>
</div>
</div>
<div id="sbar">
  <span>DANAE · qwen:7b · Artifact Generation</span>
</div>
<script>
(function(){"use strict";
const promptBox=document.getElementById('prompt-box');
const buildBtn=document.getElementById('build-btn');
const codeOut=document.getElementById('code-out');
const prevFrame=document.getElementById('prev-frame');
const prevPh=document.getElementById('prev-ph');
const logEl=document.getElementById('log');
const statusDot=document.getElementById('status-dot');
const apiStatus=document.getElementById('api-status');
const toolRack=document.getElementById('tool-rack');
let danaeMasterURL='';
let generatedCode='';

function log(type,msg){
  const t=new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const d=document.createElement('div');
  d.className='ll';
  const span1=document.createElement('span');span1.className='lt';span1.textContent='['+t+']';
  const span2=document.createElement('span');span2.className='l'+type;span2.textContent=msg;
  d.appendChild(span1);d.appendChild(span2);
  logEl.appendChild(d);logEl.scrollTop=logEl.scrollHeight;
}

function renderToolChips(){
  const tools=['qwen:7b','artifact','salesforce','html5','json'];
  toolRack.textContent='';
  tools.forEach(t=>{
    const chip=document.createElement('span');
    chip.className='chip on';
    chip.textContent=t;
    toolRack.appendChild(chip);
  });
}

function detectDANAE(){
  const params=new URLSearchParams(window.location.search);
  let endpoint=params.get('endpoint')||localStorage.getItem('danae_endpoint')||'';
  if(!endpoint){endpoint=window.location.origin+'/api';}
  danaeMasterURL=endpoint;
  localStorage.setItem('danae_endpoint',endpoint);
  statusDot.style.background='var(--lime)';
  apiStatus.textContent='Connected: '+endpoint;
  log('lai','DANAE endpoint: '+endpoint);
  renderToolChips();
}

async function callDANAE(prompt,systemPrompt){
  if(!danaeMasterURL){throw new Error('DANAE endpoint not configured');}
  log('lai','Calling DANAE...');
  const payload={model:'qwen:7b',prompt:systemPrompt+'\n\n'+prompt,stream:false};
  try{
    const res=await fetch(danaeMasterURL+'/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!res.ok){throw new Error('HTTP '+res.status);}
    const data=await res.json();
    return data.response||data.text||'';
  }catch(e){log('lerr','DANAE call failed: '+e.message);throw e;}
}

async function build(){
  const desc=promptBox.value.trim();
  if(!desc){log('lerr','describe artifact first');return;}
  buildBtn.disabled=true;buildBtn.textContent='⬡ BUILDING...';codeOut.textContent='// generating with DANAE...';
  log('lai','building artifact...');
  try{
    const systemPrompt='You are DANAE artifact builder. Generate ONLY raw HTML. No markdown. No explanation. Create self-contained HTML with Salesforce styling. Include API fetch capability for qwen:7b model.';
    const userPrompt='Build HTML artifact: '+desc;
    let html=await callDANAE(userPrompt,systemPrompt);
    html=html.replace(/^```html?\n?/i,'').replace(/```$/,'').trim();
    if(!html.startsWith('<')){const m=html.match(/<(!DOCTYPE|html)[\s\S]*<\/html>/i);if(m)html=m[0];}
    generatedCode=html;codeOut.textContent=html;codeOut.className='live';prevFrame.style.display='block';prevPh.style.display='none';prevFrame.srcdoc=html;
    log('lok','artifact generated · '+html.length+' chars');
  }catch(e){log('lerr','build failed: '+e.message);codeOut.textContent='// error: '+e.message;}
  finally{buildBtn.disabled=false;buildBtn.textContent='⬡ BUILD with DANAE';}
}

buildBtn.addEventListener('click',build);
promptBox.addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='Enter')build();});
document.getElementById('copy-btn').addEventListener('click',()=>{if(generatedCode)navigator.clipboard.writeText(generatedCode).then(()=>log('lok','copied'));});
document.getElementById('dl-btn').addEventListener('click',()=>{if(!generatedCode)return;const a=document.createElement('a');a.href='data:text/html;charset=utf-8,'+encodeURIComponent(generatedCode);a.download='danae-artifact-'+Date.now()+'.html';a.click();log('lok','downloaded');});

detectDANAE();
log('lai','DANAE Studio ready');
})();
</script>
</body>
</html>
