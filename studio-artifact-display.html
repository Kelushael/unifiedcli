<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⬡ DANAE ARTIFACT</title>
<style>
:root {--pink:#ff6eb4;--yellow:#ffe94d;--blue:#7dd8f8;--lime:#aaff00;--black:#080808;--bg:#0d0d0d;--bg2:#111;--bg3:#181818;--dim:#252525;--dim2:#333;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--lime);font-family:'Courier New',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#topbar{background:var(--black);border-bottom:1px solid var(--dim);padding:0 14px;height:36px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.t-title{color:var(--pink);font-size:10px;letter-spacing:5px;text-transform:uppercase;}
.pills{display:flex;gap:5px;}
.pill{font-size:8px;letter-spacing:2px;padding:2px 7px;border-radius:10px;border:1px solid;text-transform:uppercase;}
.p-live{color:var(--lime);border-color:var(--lime);}
#main{flex:1;display:flex;overflow:hidden;}
#left{width:260px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--dim);background:var(--bg2);overflow:hidden;}
.sect-hd{font-size:8px;letter-spacing:3px;color:#444;padding:5px 10px;text-transform:uppercase;background:var(--black);border-bottom:1px solid var(--dim);}
#controls{padding:10px;display:flex;flex-direction:column;gap:6px;}
.btn{background:transparent;border:1px solid var(--dim2);color:#666;font-size:8px;padding:4px 8px;cursor:pointer;text-transform:uppercase;transition:.15s;border-radius:2px;}
.btn:hover{border-color:var(--lime);color:var(--lime);}
.btn.primary{border-color:var(--lime);color:var(--lime);}
.btn.primary:hover{background:var(--lime);color:var(--black);}
#code-panel{flex:1;overflow-y:auto;padding:8px;font-size:7px;line-height:1.4;color:#555;font-family:monospace;}
#code-panel::-webkit-scrollbar{width:2px;}
#code-panel::-webkit-scrollbar-thumb{background:var(--dim2);}
#preview{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#preview-bar{background:var(--black);border-bottom:1px solid var(--dim);padding:0 10px;height:28px;display:flex;align-items:center;flex-shrink:0;font-size:8px;letter-spacing:2px;color:#444;text-transform:uppercase;}
#preview-frame{flex:1;border:none;background:white;}
#sbar{background:var(--black);border-top:1px solid var(--dim);padding:2px 14px;display:flex;justify-content:space-between;font-size:8px;letter-spacing:2px;color:#2a2a2a;flex-shrink:0;}
</style>
</head>
<body>
<div id="topbar">
  <div class="t-title">⬡ DANAE ARTIFACT</div>
  <div class="pills">
    <span class="pill p-live">LIVE</span>
  </div>
</div>

<div id="main">
<div id="left">
  <div class="sect-hd">// Generated Code</div>
  <div id="controls">
    <button class="btn primary" id="copy-btn">COPY CODE</button>
    <button class="btn" id="download-btn">DOWNLOAD</button>
  </div>
  <div id="code-panel"></div>
</div>

<div id="preview">
  <div id="preview-bar">// LIVE ARTIFACT</div>
  <iframe id="preview-frame"></iframe>
</div>
</div>

<div id="sbar">
  <span>Generated by DANAE</span>
</div>

<script>
(function(){"use strict";

const codePanel=document.getElementById('code-panel');
const previewFrame=document.getElementById('preview-frame');
const copyBtn=document.getElementById('copy-btn');
const downloadBtn=document.getElementById('download-btn');
let currentHTML='';

window.addEventListener('message',(e)=>{
  if(e.origin!==window.location.origin)return;
  const data=e.data;

  if(data.type==='danae:artifact'&&data.complete){
    currentHTML=data.html||'';
    
    codePanel.textContent=currentHTML;
    previewFrame.srcdoc=currentHTML;
    
    console.log('✓ Artifact displayed');
  }
});

copyBtn.addEventListener('click',()=>{
  if(currentHTML){
    navigator.clipboard.writeText(currentHTML).then(()=>{
      copyBtn.textContent='✓ COPIED';
      setTimeout(()=>{copyBtn.textContent='COPY CODE';},2000);
    });
  }
});

downloadBtn.addEventListener('click',()=>{
  if(!currentHTML)return;
  const a=document.createElement('a');
  a.href='data:text/html;charset=utf-8,'+encodeURIComponent(currentHTML);
  a.download='artifact-'+Date.now()+'.html';
  a.click();
  downloadBtn.textContent='✓ DOWNLOADED';
  setTimeout(()=>{downloadBtn.textContent='DOWNLOAD';},2000);
});

console.log('✓ Artifact display ready');
})();
</script>
</body>
</html>
